set_valves:
  name: Set Valves
  description: "Replace the entire valve list. Each valve requires entity_id and name. Optional: water_supply_id, zone_id."
  fields:
    valves:
      name: Valves
      description: "List of valves with entity_id, name, and optional water_supply_id and zone_id."
      required: true

stop_all:
  name: Stop All
  description: Close all valves immediately and cancel any running program.

create_zone:
  name: Create Zone
  description: Create a new zone.
  fields:
    id:
      name: Zone ID
      description: Unique identifier for the zone.
      required: true
      example: "jardin"
      selector:
        text:
    name:
      name: Zone Name
      description: Display name for the zone.
      required: true
      example: "Jardin complet"
      selector:
        text:

update_zone:
  name: Update Zone
  description: Update an existing zone.
  fields:
    id:
      name: Zone ID
      description: ID of the zone to update.
      required: true
      selector:
        text:
    name:
      name: Zone Name
      description: New display name.
      selector:
        text:

delete_zone:
  name: Delete Zone
  description: Delete a zone. Clears zone_id on valves that referenced it.
  fields:
    id:
      name: Zone ID
      description: ID of the zone to delete.
      required: true
      selector:
        text:

create_water_supply:
  name: Create Water Supply
  description: Create a new water supply source.
  fields:
    id:
      name: Water Supply ID
      description: Unique identifier for the water supply.
      required: true
      example: "arrivee_jardin"
      selector:
        text:
    name:
      name: Water Supply Name
      description: Display name for the water supply.
      required: true
      example: "Arrivée jardin"
      selector:
        text:

update_water_supply:
  name: Update Water Supply
  description: Update an existing water supply.
  fields:
    id:
      name: Water Supply ID
      description: ID of the water supply to update.
      required: true
      selector:
        text:
    name:
      name: Water Supply Name
      description: New display name.
      selector:
        text:

delete_water_supply:
  name: Delete Water Supply
  description: Delete a water supply. Clears water_supply_id on valves that referenced it.
  fields:
    id:
      name: Water Supply ID
      description: ID of the water supply to delete.
      required: true
      selector:
        text:

create_program:
  name: Create Program
  description: Create a new watering program with schedule and valve durations.
  fields:
    id:
      name: Program ID
      description: Unique identifier for the program.
      required: true
      example: "prog_quotidien"
      selector:
        text:
    name:
      name: Program Name
      description: Display name for the program.
      required: true
      example: "Arrosage quotidien"
      selector:
        text:
    schedule:
      name: Schedule
      description: "Schedule object with one or more trigger times: { times: ['22:00'] } or { times: ['06:00', '22:00'] }. Frequency is set per valve, not per program."
      required: true
    zones:
      name: Zones
      description: "List of zone references with valve durations. Each valve supports: an optional frequency override ({ type: every_n_days, n: 2, start_date: '2026-01-01' } or { type: weekdays, days: [mon, wed, fri] }), and an optional times list to restrict which schedule.times the valve runs at (e.g. times: ['22:00'] to only run in the evening when schedule.times is ['06:00', '22:00'])."
      required: true
    dry_run:
      name: Dry Run
      description: "Simulate execution without opening physical valves (default: false)."
      selector:
        boolean:

update_program:
  name: Update Program
  description: Update an existing program.
  fields:
    id:
      name: Program ID
      description: ID of the program to update.
      required: true
      selector:
        text:
    name:
      name: Program Name
      description: New display name.
      selector:
        text:
    schedule:
      name: Schedule
      description: "New schedule object: { times: ['22:00'] } or { times: ['06:00', '22:00'] }."
    zones:
      name: Zones
      description: "New zone references with valve durations. Each valve supports an optional frequency override and an optional times list."
    dry_run:
      name: Dry Run
      description: "Simulate execution without opening physical valves."
      selector:
        boolean:

delete_program:
  name: Delete Program
  description: Delete a program and its switch entity.
  fields:
    id:
      name: Program ID
      description: ID of the program to delete.
      required: true
      selector:
        text:

skip_program:
  name: Skip Program
  description: "Suspend a program for N days without disabling it. Use days=0 to cancel."
  fields:
    id:
      name: Program ID
      description: ID of the program to skip.
      required: true
      selector:
        text:
    days:
      name: Days
      description: "Number of days to skip (0 to clear)."
      required: true
      example: "3"
      selector:
        number:
          min: 0
          mode: box
